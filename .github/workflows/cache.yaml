name: Cache

run-name: Cache
on:
  push:
    branches:
      - main

jobs:
  setup_tools:
    name: Setup tools
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true

      # ----------------------------------------------------
      # aulua
      # ----------------------------------------------------
      - name: Get aulua latest tag name
        id: aulua_latest_tag
        run: |
          $tag = gh release view --repo karoterra/aviutl2-aulua --json tagName --jq .tagName
          "name=$tag" >> $env:GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      # キャッシュがあるか確認だけして復元はしない（lookup-only: true）
      - name: Restore aulua
        id: restore-aulua
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ./aulua
          lookup-only: true
          key: aulua-${{steps.aulua_latest_tag.outputs.name}}

      # なければダウンロードしてキャッシュを保存
      - name: Download aulua
        if: steps.restore-aulua.outputs.cache-hit != 'true'
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          repository: "karoterra/aviutl2-aulua"
          latest: true
          fileName: '*.zip'
          out-file-path: "aulua"
          extract: true

      - name: Cache aulua
        if: steps.restore-aulua.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ./aulua
          key: aulua-${{steps.aulua_latest_tag.outputs.name}}

      # ----------------------------------------------------
      # aviutl2-cli
      # ----------------------------------------------------
      - name: Get aviutl2-cli latest tag name
        id: aviutl2-cli_latest_tag
        run: |
          $tag = gh release view --repo sevenc-nanashi/aviutl2-cli --json tagName --jq .tagName
          "name=$tag" >> $env:GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Restore aviutl2-cli
        id: restore-aviutl2-cli
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ./aviutl2-cli
          lookup-only: true
          key: aviutl2-cli-${{steps.aviutl2-cli_latest_tag.outputs.name}}

      - name: Download aviutl2-cli
        if: steps.restore-aviutl2-cli.outputs.cache-hit != 'true'
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          repository: "sevenc-nanashi/aviutl2-cli"
          latest: true
          fileName: '*.exe'
          out-file-path: "aviutl2-cli"

      - name: Cache aviutl2-cli
        if: steps.restore-aviutl2-cli.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ./aviutl2-cli
          key: aviutl2-cli-${{ steps.aviutl2-cli_latest_tag.outputs.name }}

      # ----------------------------------------------------
      # yq
      # ----------------------------------------------------
      - name: Get yq latest tag name
        id: yq_latest_tag
        run: |
          $tag = gh release view --repo mikefarah/yq --json tagName --jq .tagName
          "name=$tag" >> $env:GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore yq
        id: restore-yq
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ./yq
          lookup-only: true
          key: yq-${{ steps.yq_latest_tag.outputs.name }}

      - name: Download yq
        if: steps.restore-yq.outputs.cache-hit != 'true'
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          repository: "mikefarah/yq"
          latest: true
          fileName: '*_windows_amd64.exe'
          out-file-path: "yq"

      - name: Cache yq
        if: steps.restore-yq.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ./yq
          key: yq-${{ steps.yq_latest_tag.outputs.name }}

      # ----------------------------------------------------
      # Rust
      # ----------------------------------------------------
      - name: Install toolchain
        run: rustup toolchain install --profile minimal
        shell: bash

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          add-job-id-key: false
          lookup-only: true
